<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexus Capital | Global Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg: #020617; --text: #f8fafc; --text-muted: #94a3b8; --accent: #38bdf8; }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg); color: var(--text); overflow-x: hidden; }
nav { padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 10; }
.logo { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.04em; }
.hero { position: relative; padding: 10rem 5%; text-align: center; z-index: 1; }
.hero-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
.hero-bg img { width: 100%; height: 100vh; object-fit: cover; opacity: 0.35; mask-image: linear-gradient(to bottom, black 40%, transparent 100%); -webkit-mask-image: linear-gradient(to bottom, black 40%, transparent 100%); }
h1 { font-size: 5.5rem; font-weight: 700; letter-spacing: -0.05em; line-height: 1.1; margin-bottom: 1.5rem; background: linear-gradient(to bottom right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
p { font-size: 1.25rem; color: var(--text-muted); max-width: 600px; margin: 0 auto 3rem auto; line-height: 1.6; }
.cta { display: inline-block; padding: 1rem 2.5rem; background: var(--text); color: var(--bg); border-radius: 99px; font-weight: 600; text-decoration: none; transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s; box-shadow: 0 4px 20px rgba(255,255,255,0.1); }
.cta:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,255,255,0.2); }
.stats { display: flex; justify-content: center; gap: 6rem; padding: 4rem 5%; flex-wrap: wrap; position: relative; z-index: 1; }
.stat-item { text-align: center; }
.stat-item h2 { font-size: 3.5rem; color: var(--accent); font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.05em; text-shadow: 0 0 20px rgba(56,189,248,0.3); }
.stat-item p { font-size: 0.875rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.15em; font-weight: 500; }
@media (max-width: 768px) { h1 { font-size: 3.5rem; } .stats { gap: 3rem; flex-direction: column; } }
</style>
</head>
<body>
<div class="hero-bg"><img src="hero.png" alt="Finance Data"></div>
<nav>
    <div class="logo">NEXUS.</div>
    <div style="font-weight:500; cursor:pointer;">Login</div>
</nav>
<section class="hero">
    <h1>Data-Driven<br>Financial Future.</h1>
    <p>高度なAIアルゴリズムと堅牢なセキュリティで、不確実な市場におけるあなたの資産運用を確実なものにします。次世代の投資プラットフォーム。</p>
    <a href="#" class="cta">口座を開設する</a>
</section>
<section class="stats">
    <div class="stat-item">
        <h2>$120B+</h2>
        <p>Assets Under Mgt</p>
    </div>
    <div class="stat-item">
        <h2>99.9%</h2>
        <p>System Uptime</p>
    </div>
    <div class="stat-item">
        <h2>0.01s</h2>
        <p>Execution Speed</p>
    </div>
</section>
</body>
</html>
